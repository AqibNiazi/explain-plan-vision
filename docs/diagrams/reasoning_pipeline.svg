<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050810"/><stop offset="100%" stop-color="#090d1a"/>
    </linearGradient>
