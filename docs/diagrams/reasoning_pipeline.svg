    </marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="900" height="640" fill="url(#bg)"/>
  <g opacity="0.04" stroke="#7c4dff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/><line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="0" y1="360" x2="900" y2="360"/><line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="440" x2="900" y2="440"/><line x1="0" y1="480" x2="900" y2="480"/>
    <line x1="0" y1="520" x2="900" y2="520"/><line x1="0" y1="560" x2="900" y2="560"/>
    <line x1="0" y1="600" x2="900" y2="600"/>
    <line x1="80" y1="0" x2="80" y2="640"/><line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/><line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="560" y1="0" x2="560" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/><line x1="800" y1="0" x2="800" y2="640"/>
  </g>

  <text x="450" y="32" text-anchor="middle" fill="#7c4dff" font-size="10" letter-spacing="6" filter="url(#glow)">NEURO-SYMBOLIC REASONING PIPELINE</text>
  <line x1="60" y1="44" x2="840" y2="44" stroke="#7c4dff" stroke-width="0.5" opacity="0.4"/>

  <!-- NEURAL OUTPUTS (inputs to reasoning) -->
  <rect x="60" y="60" width="780" height="60" fill="rgba(0,229,255,0.04)" stroke="#00e5ff" stroke-width="1"/>
  <rect x="60" y="60" width="780" height="18" fill="rgba(0,229,255,0.08)"/>
  <text x="450" y="73" text-anchor="middle" fill="#00e5ff" font-size="8" letter-spacing="3">NEURAL LAYER OUTPUTS (Stage 01 + 02)</text>
  <!-- mini output chips -->
  <rect x="80" y="86" width="110" height="20" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.6"/>
  <text x="135" y="100" text-anchor="middle" fill="#e8f0fe" font-size="7">disease: Late Blight</text>
  <rect x="202" y="86" width="100" height="20" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.6"/>
  <text x="252" y="100" text-anchor="middle" fill="#e8f0fe" font-size="7">confidence: 0.97</text>
  <rect x="314" y="86" width="90" height="20" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.6"/>
  <text x="359" y="100" text-anchor="middle" fill="#e8f0fe" font-size="7">severity: high</text>
  <rect x="416" y="86" width="110" height="20" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.6"/>
  <text x="471" y="100" text-anchor="middle" fill="#e8f0fe" font-size="7">spread: widespread</text>
  <rect x="538" y="86" width="100" height="20" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.6"/>
  <text x="588" y="100" text-anchor="middle" fill="#e8f0fe" font-size="7">focus: 0.723</text>
  <rect x="650" y="86" width="100" height="20" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.6"/>
  <text x="700" y="100" text-anchor="middle" fill="#e8f0fe" font-size="7">entropy: 1.241</text>
  <rect x="762" y="86" width="68" height="20" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.6"/>
  <text x="796" y="100" text-anchor="middle" fill="#e8f0fe" font-size="7">plant: tomato</text>

  <!-- Arrow down -->
  <line x1="450" y1="120" x2="450" y2="144" stroke="#7c4dff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>

  <!-- FACT EXTRACTION -->
  <rect x="60" y="148" width="780" height="96" fill="rgba(124,77,255,0.05)" stroke="#7c4dff" stroke-width="1.5"/>
  <rect x="60" y="148" width="4" height="96" fill="#7c4dff"/>
  <rect x="60" y="148" width="780" height="18" fill="rgba(124,77,255,0.1)"/>
  <text x="450" y="161" text-anchor="middle" fill="#7c4dff" font-size="8" letter-spacing="3">SYMBOLIC FACT EXTRACTION — Stage 03</text>
  <!-- Facts list -->
  <text x="80" y="182" fill="#e8f0fe" font-size="9" font-family="'Courier New', monospace">disease_detected(tomato_late_blight)          confidence: 0.97</text>
  <text x="80" y="198" fill="#8899bb" font-size="9" font-family="'Courier New', monospace">confidence_level(high)                        confidence: 0.97</text>
  <text x="80" y="214" fill="#8899bb" font-size="9" font-family="'Courier New', monospace">severity_level(high)                          confidence: 0.85</text>
  <text x="80" y="230" fill="#8899bb" font-size="9" font-family="'Courier New', monospace">infection_spread(widespread)                  confidence: 0.91</text>
  <text x="500" y="182" fill="#8899bb" font-size="9" font-family="'Courier New', monospace">disease_type(fungal)                          confidence: 1.00</text>
  <text x="500" y="198" fill="#8899bb" font-size="9" font-family="'Courier New', monospace">focus_score(0.723)                            confidence: 0.91</text>
  <text x="500" y="214" fill="#8899bb" font-size="9" font-family="'Courier New', monospace">activation_entropy(1.241)                     confidence: 0.91</text>
  <text x="500" y="230" fill="#8899bb" font-size="9" font-family="'Courier New', monospace">host_plant(tomato)                            confidence: 1.00</text>

  <!-- Arrow down -->
  <line x1="450" y1="244" x2="450" y2="268" stroke="#7c4dff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>

  <!-- KG INFERENCE -->
  <rect x="60" y="272" width="780" height="116" fill="rgba(124,77,255,0.04)" stroke="#7c4dff" stroke-width="1.5"/>
  <rect x="60" y="272" width="4" height="116" fill="#7c4dff"/>
  <rect x="60" y="272" width="780" height="18" fill="rgba(124,77,255,0.1)"/>
  <text x="450" y="285" text-anchor="middle" fill="#7c4dff" font-size="8" letter-spacing="3">KNOWLEDGE GRAPH INFERENCE — Stage 04 · NetworkX · 20+ Rules</text>

  <!-- Left — Rules fired -->
  <rect x="76" y="298" width="200" height="78" fill="rgba(124,77,255,0.05)" stroke="#7c4dff" stroke-width="0.6"/>
  <text x="176" y="313" text-anchor="middle" fill="#7c4dff" font-size="7" letter-spacing="1">RULES FIRED (14 of 20+)</text>
  <text x="88" y="330" fill="#8899bb" font-size="7">fungal_disease_rule         → treatment_class</text>
  <text x="88" y="344" fill="#8899bb" font-size="7">high_severity_rule          → escalation_flag</text>
  <text x="88" y="358" fill="#8899bb" font-size="7">widespread_spread_rule      → requires_isolation</text>
  <text x="88" y="372" fill="#8899bb" font-size="7">urgency_composite_rule      → urgency_score</text>

  <!-- Middle — Derived inferences -->
  <rect x="296" y="298" width="240" height="78" fill="rgba(255,179,0,0.05)" stroke="#ffb300" stroke-width="0.6"/>
  <text x="416" y="313" text-anchor="middle" fill="#ffb300" font-size="7" letter-spacing="1">DERIVED INFERENCES</text>
  <text x="308" y="330" fill="#e8f0fe" font-size="9">urgency_level    →  critical</text>
  <text x="308" y="346" fill="#e8f0fe" font-size="9">urgency_score    →  0.87</text>
  <text x="308" y="362" fill="#e8f0fe" font-size="9">spread_risk      →  high</text>
  <text x="308" y="378" fill="#e8f0fe" font-size="9">treatment_class  →  fungicide</text>

  <!-- Right — Flags -->
  <rect x="556" y="298" width="268" height="78" fill="rgba(255,64,96,0.04)" stroke="rgba(255,64,96,0.4)" stroke-width="0.6"/>
  <text x="690" y="313" text-anchor="middle" fill="#ff4060" font-size="7" letter-spacing="1">BOOLEAN FLAGS</text>
  <text x="570" y="330" fill="#e8f0fe" font-size="9">requires_isolation   →  true</text>
  <text x="570" y="346" fill="#e8f0fe" font-size="9">escalation_flag      →  true</text>
  <text x="570" y="362" fill="#e8f0fe" font-size="9">disease_fungal       →  true</text>
  <text x="570" y="378" fill="#ff4060" font-size="9">rules_fired          →  14</text>

  <!-- Arrow -->
  <line x1="450" y1="388" x2="450" y2="412" stroke="#7c4dff" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>

  <!-- DERIVED OUTPUTS -->
  <rect x="60" y="416" width="780" height="72" fill="rgba(0,255,157,0.04)" stroke="#00ff9d" stroke-width="1.5"/>
  <rect x="60" y="416" width="4" height="72" fill="#00ff9d"/>
  <rect x="60" y="416" width="780" height="18" fill="rgba(0,255,157,0.08)"/>
  <text x="450" y="429" text-anchor="middle" fill="#00ff9d" font-size="8" letter-spacing="3">DOWNSTREAM CONSUMERS</text>
  <!-- Three boxes -->
  <rect x="80" y="442" width="180" height="36" fill="rgba(0,255,157,0.05)" stroke="#00ff9d" stroke-width="0.6"/>
  <text x="170" y="458" text-anchor="middle" fill="#00ff9d" font-size="8">Planning Engine</text>
  <text x="170" y="472" text-anchor="middle" fill="#8899bb" font-size="7">adapts treatment steps</text>
  <rect x="360" y="442" width="180" height="36" fill="rgba(255,179,0,0.05)" stroke="#ffb300" stroke-width="0.6"/>
  <text x="450" y="458" text-anchor="middle" fill="#ffb300" font-size="8">Counterfactual Engine</text>
  <text x="450" y="472" text-anchor="middle" fill="#8899bb" font-size="7">4 what-if scenarios</text>
  <rect x="640" y="442" width="180" height="36" fill="rgba(124,77,255,0.05)" stroke="#7c4dff" stroke-width="0.6"/>
  <text x="730" y="458" text-anchor="middle" fill="#7c4dff" font-size="8">Explanation Layer</text>
  <text x="730" y="472" text-anchor="middle" fill="#8899bb" font-size="7">farmer / researcher</text>

  <!-- Key insight box -->
  <rect x="60" y="508" width="780" height="52" fill="rgba(0,229,255,0.03)" stroke="#00e5ff" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="450" y="526" text-anchor="middle" fill="#00e5ff" font-size="8" letter-spacing="2">KEY RESEARCH CONTRIBUTION</text>
  <text x="450" y="546" text-anchor="middle" fill="#8899bb" font-size="8">Neural outputs are GROUNDED into verifiable symbolic facts before any planning decision is made.</text>
  <text x="450" y="560" text-anchor="middle" fill="#8899bb" font-size="8">Every treatment step references the inference rule that triggered it — full traceability.</text>

  <text x="450" y="616" text-anchor="middle" fill="#4a5568" font-size="7">Muhammad Aqib Niazi  ·  ExplainPlan Vision  ·  2026</text>
</svg>
