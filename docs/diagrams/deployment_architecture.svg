<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#090d1a"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00e5ff" opacity="0.8"/>
    </marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="900" height="560" fill="url(#bg)"/>
  <!-- grid -->
  <g opacity="0.04" stroke="#00e5ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/><line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="0" y1="360" x2="900" y2="360"/><line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="440" x2="900" y2="440"/><line x1="0" y1="480" x2="900" y2="480"/>
    <line x1="0" y1="520" x2="900" y2="520"/>
    <line x1="80" y1="0" x2="80" y2="560"/><line x1="160" y1="0" x2="160" y2="560"/>
    <line x1="240" y1="0" x2="240" y2="560"/><line x1="320" y1="0" x2="320" y2="560"/>
    <line x1="400" y1="0" x2="400" y2="560"/><line x1="480" y1="0" x2="480" y2="560"/>
    <line x1="560" y1="0" x2="560" y2="560"/><line x1="640" y1="0" x2="640" y2="560"/>
    <line x1="720" y1="0" x2="720" y2="560"/><line x1="800" y1="0" x2="800" y2="560"/>
    <line x1="880" y1="0" x2="880" y2="560"/>
  </g>

  <text x="450" y="32" text-anchor="middle" fill="#00e5ff" font-size="10" letter-spacing="6" filter="url(#glow)">DEPLOYMENT ARCHITECTURE</text>
  <line x1="60" y1="44" x2="840" y2="44" stroke="#00e5ff" stroke-width="0.5" opacity="0.4"/>

  <!-- USER -->
  <rect x="370" y="60" width="160" height="48" fill="rgba(0,229,255,0.05)" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="450" y="80" text-anchor="middle" fill="#00e5ff" font-size="8" letter-spacing="2">DEVELOPER / USER</text>
  <text x="450" y="98" text-anchor="middle" fill="#e8f0fe" font-size="11" font-weight="bold">Browser</text>

  <!-- Arrow down to CDN split -->
  <line x1="450" y1="108" x2="450" y2="136" stroke="#00e5ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="250" y1="136" x2="650" y2="136" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>

  <!-- LEFT — Vercel -->
  <line x1="280" y1="136" x2="280" y2="168" stroke="#00e5ff" stroke-width="1.2" marker-end="url(#arr)" opacity="0.7"/>
  <rect x="100" y="172" width="360" height="156" fill="rgba(0,229,255,0.03)" stroke="#00e5ff" stroke-width="1"/>
  <rect x="100" y="172" width="360" height="20" fill="rgba(0,229,255,0.08)"/>
  <text x="280" y="186" text-anchor="middle" fill="#00e5ff" font-size="8" letter-spacing="3">VERCEL — CDN / EDGE NETWORK</text>

  <!-- React app box -->
  <rect x="120" y="204" width="140" height="108" fill="rgba(0,229,255,0.04)" stroke="#00e5ff" stroke-width="0.8"/>
  <text x="190" y="222" text-anchor="middle" fill="#00e5ff" font-size="7" letter-spacing="2">REACT SPA</text>
  <text x="190" y="240" text-anchor="middle" fill="#e8f0fe" font-size="9" font-weight="bold">npm run build</text>
  <text x="190" y="256" text-anchor="middle" fill="#8899bb" font-size="7">dist/ → Vercel CDN</text>
  <text x="190" y="272" text-anchor="middle" fill="#8899bb" font-size="7">React 19</text>
  <text x="190" y="284" text-anchor="middle" fill="#8899bb" font-size="7">Tailwind CSS 4</text>
  <text x="190" y="296" text-anchor="middle" fill="#8899bb" font-size="7">Vite build</text>
  <text x="190" y="308" text-anchor="middle" fill="#8899bb" font-size="7">VITE_API_URL → HF</text>

  <!-- Env var note -->
  <rect x="278" y="204" width="162" height="108" fill="rgba(0,229,255,0.02)" stroke="#00e5ff" stroke-width="0.6" stroke-dasharray="3,2"/>
  <text x="359" y="222" text-anchor="middle" fill="#4a5568" font-size="7" letter-spacing="1">ENV CONFIG</text>
  <text x="289" y="242" fill="#8899bb" font-size="7">VITE_API_URL=</text>
  <text x="289" y="256" fill="#00e5ff" font-size="7">aqibniazi-explainplan</text>
  <text x="289" y="270" fill="#00e5ff" font-size="7">-vision-api.hf.space</text>
  <text x="289" y="292" fill="#4a5568" font-size="7">Branch: main → auto</text>
  <text x="289" y="304" fill="#4a5568" font-size="7">deploy on push</text>

  <!-- RIGHT — HuggingFace -->
  <line x1="640" y1="136" x2="640" y2="168" stroke="#00e5ff" stroke-width="1.2" marker-end="url(#arr)" opacity="0.7"/>
  <rect x="460" y="172" width="380" height="280" fill="rgba(255,179,0,0.02)" stroke="#ffb300" stroke-width="1"/>
  <rect x="460" y="172" width="380" height="20" fill="rgba(255,179,0,0.08)"/>
  <text x="650" y="186" text-anchor="middle" fill="#ffb300" font-size="8" letter-spacing="3">HUGGINGFACE SPACES — DOCKER CPU</text>

  <!-- Docker container box -->
  <rect x="476" y="204" width="344" height="236" fill="rgba(255,179,0,0.03)" stroke="#ffb300" stroke-width="0.8" stroke-dasharray="4,2"/>
  <text x="648" y="220" text-anchor="middle" fill="#ffb300" font-size="7" letter-spacing="2">DOCKER CONTAINER  python:3.11-slim</text>

  <!-- Uvicorn -->
  <rect x="492" y="228" width="120" height="44" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="0.8"/>
  <text x="552" y="245" text-anchor="middle" fill="#00e5ff" font-size="7">UVICORN</text>
  <text x="552" y="260" text-anchor="middle" fill="#8899bb" font-size="7">port 7860 · 1 worker</text>
  <text x="552" y="272" text-anchor="middle" fill="#4a5568" font-size="6">startup: ~45s cold</text>

  <!-- FastAPI -->
  <rect x="628" y="228" width="172" height="44" fill="rgba(0,255,157,0.06)" stroke="#00ff9d" stroke-width="0.8"/>
  <text x="714" y="245" text-anchor="middle" fill="#00ff9d" font-size="7">FASTAPI 0.115</text>
  <text x="714" y="260" text-anchor="middle" fill="#8899bb" font-size="7">8 endpoints · Pydantic v2</text>
  <text x="714" y="272" text-anchor="middle" fill="#4a5568" font-size="6">CORS: Vercel domain</text>

  <!-- Pipeline box -->
  <rect x="492" y="284" width="308" height="144" fill="rgba(124,77,255,0.04)" stroke="#7c4dff" stroke-width="0.8"/>
  <text x="646" y="300" text-anchor="middle" fill="#7c4dff" font-size="7" letter-spacing="2">INFERENCE PIPELINE</text>
  <text x="504" y="318" fill="#8899bb" font-size="7">Vision Engine   — EfficientNet-B0  (CPU inference)</text>
  <text x="504" y="334" fill="#8899bb" font-size="7">XAI Engine      — Grad-CAM++</text>
  <text x="504" y="350" fill="#8899bb" font-size="7">Reasoning       — NetworkX KG · 20+ rules</text>
  <text x="504" y="366" fill="#8899bb" font-size="7">Planner         — 6-context adaptive plan</text>
  <text x="504" y="382" fill="#8899bb" font-size="7">Memory          — sliding-window trend store</text>
  <text x="504" y="398" fill="#8899bb" font-size="7">Assets          — assets/best_model.pth (repo)</text>
  <text x="504" y="412" fill="#4a5568" font-size="6">RAM: ~1.2GB  ·  Latency: ~2.1s/req  ·  Free tier CPU</text>

  <!-- HTTPS arrow between vercel and HF -->
  <line x1="460" y1="310" x2="428" y2="310" stroke="#00e5ff" stroke-width="1.2" marker-end="url(#arr)" opacity="0.5" stroke-dasharray="3,2"/>
  <text x="444" y="305" text-anchor="middle" fill="#4a5568" font-size="6">HTTPS</text>
  <text x="444" y="318" text-anchor="middle" fill="#4a5568" font-size="6">REST</text>

  <!-- Bottom info -->
  <line x1="60" y1="476" x2="840" y2="476" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
  <text x="450" y="500" text-anchor="middle" fill="#4a5568" font-size="8" letter-spacing="2">CORS POLICY: allow_origins = ["https://your-app.vercel.app"]</text>
  <text x="450" y="520" text-anchor="middle" fill="#4a5568" font-size="7">Frontend (Vercel) → HTTPS → Backend (HuggingFace Spaces :7860) → Uvicorn → FastAPI → Inference Pipeline</text>
  <text x="450" y="540" text-anchor="middle" fill="#4a5568" font-size="7">Muhammad Aqib Niazi  ·  ExplainPlan Vision  ·  2026</text>
</svg>
