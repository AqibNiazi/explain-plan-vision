  <text x="234" y="194" fill="#8899bb" font-size="9">EfficientNet-B0  ·  5.3M params  ·  PlantVillage fine-tune</text>
  <text x="234" y="210" fill="#8899bb" font-size="9">15 disease classes  ·  Top-1: 96.8%  ·  Top-3: 99.1%</text>
