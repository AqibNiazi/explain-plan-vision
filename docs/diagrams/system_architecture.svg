  <line x1="330" y1="644" x2="330" y2="648" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
  <line x1="570" y1="644" x2="570" y2="648" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>
  <line x1="330" y1="644" x2="570" y2="644" stroke="#00e5ff" stroke-width="1.2" opacity="0.6"/>

