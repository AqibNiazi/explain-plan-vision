  <rect x="234" y="798" width="76" height="18" fill="rgba(0,255,157,0.1)" stroke="#00ff9d" stroke-width="0.8"/>
  <text x="272" y="811" text-anchor="middle" fill="#00ff9d" font-size="8">Farmer</text>
  <rect x="320" y="798" width="90" height="18" fill="rgba(0,229,255,0.1)" stroke="#00e5ff" stroke-width="0.8"/>
  <text x="365" y="811" text-anchor="middle" fill="#00e5ff" font-size="8">Agronomist</text>
  <rect x="420" y="798" width="90" height="18" fill="rgba(124,77,255,0.1)" stroke="#7c4dff" stroke-width="0.8"/>
  <text x="465" y="811" text-anchor="middle" fill="#7c4dff" font-size="8">Researcher</text>
  <text x="234" y="828" fill="#8899bb" font-size="9">All grounded in verified symbolic facts — no LLM hallucination</text>

  <!-- Arrow final -->
  <line x1="450" y1="832" x2="450" y2="852" stroke="#00e5ff" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>

