<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#090d1a"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#8899bb" opacity="0.6"/>
    </marker>
    <marker id="arrCyan" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#00e5ff" opacity="0.8"/>
    </marker>
    <marker id="arrAmber" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ffb300" opacity="0.8"/>
    </marker>
    <marker id="arrRed" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ff4060" opacity="0.8"/>
    </marker>
    <marker id="arrGreen" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#00ff9d" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="900" height="700" fill="url(#bg)"/>

  <!-- grid -->
  <g opacity="0.03" stroke="#7c4dff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/><line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="0" y1="360" x2="900" y2="360"/><line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="440" x2="900" y2="440"/><line x1="0" y1="480" x2="900" y2="480"/>
    <line x1="0" y1="520" x2="900" y2="520"/><line x1="0" y1="560" x2="900" y2="560"/>
    <line x1="0" y1="600" x2="900" y2="600"/><line x1="0" y1="640" x2="900" y2="640"/>
    <line x1="0" y1="680" x2="900" y2="680"/>
    <line x1="80" y1="0" x2="80" y2="700"/><line x1="160" y1="0" x2="160" y2="700"/>
    <line x1="240" y1="0" x2="240" y2="700"/><line x1="320" y1="0" x2="320" y2="700"/>
    <line x1="400" y1="0" x2="400" y2="700"/><line x1="480" y1="0" x2="480" y2="700"/>
    <line x1="560" y1="0" x2="560" y2="700"/><line x1="640" y1="0" x2="640" y2="700"/>
    <line x1="720" y1="0" x2="720" y2="700"/><line x1="800" y1="0" x2="800" y2="700"/>
  </g>

  <text x="450" y="32" text-anchor="middle" fill="#7c4dff" font-size="10" letter-spacing="6" filter="url(#glow)">DISEASE KNOWLEDGE GRAPH — NetworkX</text>
  <line x1="60" y1="44" x2="840" y2="44" stroke="#7c4dff" stroke-width="0.5" opacity="0.4"/>

  <!-- Legend -->
  <rect x="680" y="56" width="200" height="130" fill="rgba(0,0,0,0.4)" stroke="#8899bb" stroke-width="0.5"/>
  <text x="780" y="72" text-anchor="middle" fill="#8899bb" font-size="7" letter-spacing="2">LEGEND</text>
  <circle cx="698" cy="90" r="8" fill="rgba(0,229,255,0.15)" stroke="#00e5ff" stroke-width="1.5"/>
  <text x="712" y="94" fill="#e8f0fe" font-size="7">Disease Class Node</text>
  <circle cx="698" cy="110" r="8" fill="rgba(255,179,0,0.15)" stroke="#ffb300" stroke-width="1.5"/>
  <text x="712" y="114" fill="#e8f0fe" font-size="7">Treatment Node</text>
  <circle cx="698" cy="130" r="8" fill="rgba(124,77,255,0.15)" stroke="#7c4dff" stroke-width="1.5"/>
  <text x="712" y="134" fill="#e8f0fe" font-size="7">Urgency Node</text>
  <circle cx="698" cy="150" r="8" fill="rgba(255,64,96,0.15)" stroke="#ff4060" stroke-width="1.5"/>
  <text x="712" y="154" fill="#e8f0fe" font-size="7">Risk Node</text>
  <circle cx="698" cy="170" r="8" fill="rgba(0,255,157,0.15)" stroke="#00ff9d" stroke-width="1.5"/>
  <text x="712" y="174" fill="#e8f0fe" font-size="7">Intervention Node</text>

  <!-- ══════════════════════════════════════ -->
  <!-- CENTRAL HUB — disease type nodes -->
  <!-- ══════════════════════════════════════ -->

  <!-- FUNGAL hub -->
  <circle cx="300" cy="200" r="34" fill="rgba(0,229,255,0.08)" stroke="#00e5ff" stroke-width="2" filter="url(#softglow)"/>
  <text x="300" y="196" text-anchor="middle" fill="#00e5ff" font-size="9" font-weight="bold">FUNGAL</text>
  <text x="300" y="210" text-anchor="middle" fill="#8899bb" font-size="7">disease_type</text>

  <!-- BACTERIAL hub -->
  <circle cx="300" cy="390" r="34" fill="rgba(0,229,255,0.08)" stroke="#00e5ff" stroke-width="2" filter="url(#softglow)"/>
  <text x="300" y="386" text-anchor="middle" fill="#00e5ff" font-size="9" font-weight="bold">BACTERIAL</text>
  <text x="300" y="400" text-anchor="middle" fill="#8899bb" font-size="7">disease_type</text>

  <!-- VIRAL hub (small) -->
  <circle cx="300" cy="510" r="26" fill="rgba(0,229,255,0.05)" stroke="#00e5ff" stroke-width="1.2"/>
  <text x="300" y="506" text-anchor="middle" fill="#00e5ff" font-size="8">VIRAL</text>
  <text x="300" y="520" text-anchor="middle" fill="#8899bb" font-size="7">disease_type</text>

  <!-- Disease class nodes — Fungal -->
  <circle cx="120" cy="120" r="22" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="1"/>
  <text x="120" y="116" text-anchor="middle" fill="#e8f0fe" font-size="6.5">Tomato</text>
  <text x="120" y="128" text-anchor="middle" fill="#e8f0fe" font-size="6.5">Late Blight</text>

  <circle cx="120" cy="200" r="22" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="1"/>
  <text x="120" y="196" text-anchor="middle" fill="#e8f0fe" font-size="6.5">Tomato</text>
  <text x="120" y="208" text-anchor="middle" fill="#e8f0fe" font-size="6.5">Early Blight</text>

  <circle cx="120" cy="280" r="22" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="1"/>
  <text x="120" y="276" text-anchor="middle" fill="#e8f0fe" font-size="6.5">Corn</text>
  <text x="120" y="288" text-anchor="middle" fill="#e8f0fe" font-size="6.5">Common Rust</text>

  <!-- Disease class nodes — Bacterial -->
  <circle cx="120" cy="390" r="22" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="1"/>
  <text x="120" y="386" text-anchor="middle" fill="#e8f0fe" font-size="6.5">Tomato</text>
  <text x="120" y="398" text-anchor="middle" fill="#e8f0fe" font-size="6.5">Bact. Spot</text>

  <circle cx="120" cy="460" r="22" fill="rgba(0,229,255,0.06)" stroke="#00e5ff" stroke-width="1"/>
  <text x="120" y="456" text-anchor="middle" fill="#e8f0fe" font-size="6.5">Pepper</text>
  <text x="120" y="468" text-anchor="middle" fill="#e8f0fe" font-size="6.5">Bact. Spot</text>

  <!-- Edges: disease → type -->
  <line x1="142" y1="120" x2="272" y2="185" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" marker-end="url(#arrCyan)"/>
  <line x1="142" y1="200" x2="266" y2="200" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" marker-end="url(#arrCyan)"/>
  <line x1="142" y1="280" x2="272" y2="215" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" marker-end="url(#arrCyan)"/>
  <line x1="142" y1="390" x2="266" y2="390" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" marker-end="url(#arrCyan)"/>
  <line x1="142" y1="460" x2="272" y2="405" stroke="#00e5ff" stroke-width="0.8" opacity="0.4" marker-end="url(#arrCyan)"/>

  <!-- ══ TREATMENT NODES ══ -->
  <circle cx="490" cy="140" r="28" fill="rgba(255,179,0,0.12)" stroke="#ffb300" stroke-width="2" filter="url(#softglow)"/>
  <text x="490" y="136" text-anchor="middle" fill="#ffb300" font-size="8" font-weight="bold">FUNGICIDE</text>
  <text x="490" y="150" text-anchor="middle" fill="#8899bb" font-size="6.5">treatment_class</text>

  <circle cx="490" cy="260" r="28" fill="rgba(255,179,0,0.12)" stroke="#ffb300" stroke-width="2" filter="url(#softglow)"/>
  <text x="490" y="256" text-anchor="middle" fill="#ffb300" font-size="8" font-weight="bold">COPPER</text>
  <text x="490" y="268" text-anchor="middle" fill="#ffb300" font-size="7">BACTERICIDE</text>

  <circle cx="490" cy="390" r="28" fill="rgba(255,179,0,0.10)" stroke="#ffb300" stroke-width="1.5"/>
  <text x="490" y="386" text-anchor="middle" fill="#ffb300" font-size="8">CULTURAL</text>
  <text x="490" y="398" text-anchor="middle" fill="#ffb300" font-size="7">REMOVAL</text>

  <!-- Edges: type → treatment -->
  <line x1="334" y1="200" x2="462" y2="150" stroke="#ffb300" stroke-width="1.2" opacity="0.6" marker-end="url(#arrAmber)"/>
  <line x1="334" y1="390" x2="462" y2="270" stroke="#ffb300" stroke-width="1.2" opacity="0.6" marker-end="url(#arrAmber)"/>
  <line x1="326" y1="510" x2="462" y2="405" stroke="#ffb300" stroke-width="0.8" opacity="0.4" marker-end="url(#arrAmber)"/>

  <!-- Edge labels -->
  <text x="395" y="165" fill="#ffb300" font-size="7" opacity="0.7">→ fungicide</text>
  <text x="390" y="322" fill="#ffb300" font-size="7" opacity="0.7">→ bactericide</text>

  <!-- ══ URGENCY NODES ══ -->
  <circle cx="490" cy="510" r="24" fill="rgba(255,64,96,0.15)" stroke="#ff4060" stroke-width="2" filter="url(#softglow)"/>
  <text x="490" y="506" text-anchor="middle" fill="#ff4060" font-size="8" font-weight="bold">CRITICAL</text>
  <text x="490" y="519" text-anchor="middle" fill="#8899bb" font-size="6.5">urgency_level</text>

  <circle cx="600" cy="440" r="24" fill="rgba(255,179,0,0.12)" stroke="#ffb300" stroke-width="1.5"/>
  <text x="600" y="436" text-anchor="middle" fill="#ffb300" font-size="8">HIGH</text>
  <text x="600" y="449" text-anchor="middle" fill="#8899bb" font-size="6.5">urgency_level</text>

  <circle cx="600" cy="520" r="20" fill="rgba(0,229,255,0.08)" stroke="#00e5ff" stroke-width="1"/>
  <text x="600" y="516" text-anchor="middle" fill="#00e5ff" font-size="8">MEDIUM</text>
  <text x="600" y="528" text-anchor="middle" fill="#8899bb" font-size="6.5">urgency_level</text>

  <circle cx="600" cy="590" r="20" fill="rgba(0,255,157,0.08)" stroke="#00ff9d" stroke-width="1"/>
  <text x="600" y="586" text-anchor="middle" fill="#00ff9d" font-size="8">LOW</text>
  <text x="600" y="598" text-anchor="middle" fill="#8899bb" font-size="6.5">urgency_level</text>

  <!-- severity node pointing to urgency -->
  <circle cx="350" cy="570" r="26" fill="rgba(255,64,96,0.08)" stroke="#ff4060" stroke-width="1.5"/>
  <text x="350" y="566" text-anchor="middle" fill="#ff4060" font-size="8">SEVERITY</text>
  <text x="350" y="579" text-anchor="middle" fill="#8899bb" font-size="7">HIGH</text>

  <line x1="376" y1="570" x2="466" y2="515" stroke="#ff4060" stroke-width="1.2" opacity="0.5" marker-end="url(#arrRed)"/>
  <line x1="376" y1="566" x2="576" y2="445" stroke="#ffb300" stroke-width="0.8" opacity="0.4" marker-end="url(#arrAmber)"/>

  <!-- ══ INTERVENTION NODES ══ -->
  <circle cx="660" cy="140" r="26" fill="rgba(0,255,157,0.10)" stroke="#00ff9d" stroke-width="1.5" filter="url(#softglow)"/>
  <text x="660" y="136" text-anchor="middle" fill="#00ff9d" font-size="7.5">ISOLATE</text>
  <text x="660" y="149" text-anchor="middle" fill="#8899bb" font-size="6.5">intervention</text>

  <circle cx="660" cy="220" r="26" fill="rgba(0,255,157,0.10)" stroke="#00ff9d" stroke-width="1.5"/>
  <text x="660" y="216" text-anchor="middle" fill="#00ff9d" font-size="7.5">SPRAY</text>
  <text x="660" y="229" text-anchor="middle" fill="#8899bb" font-size="6.5">intervention</text>

  <circle cx="660" cy="300" r="26" fill="rgba(0,255,157,0.10)" stroke="#00ff9d" stroke-width="1.5"/>
  <text x="660" y="296" text-anchor="middle" fill="#00ff9d" font-size="7.5">REMOVE</text>
  <text x="660" y="309" text-anchor="middle" fill="#8899bb" font-size="6.5">intervention</text>

  <circle cx="660" cy="380" r="26" fill="rgba(0,255,157,0.08)" stroke="#00ff9d" stroke-width="1"/>
  <text x="660" y="376" text-anchor="middle" fill="#00ff9d" font-size="7.5">MONITOR</text>
  <text x="660" y="389" text-anchor="middle" fill="#8899bb" font-size="6.5">intervention</text>

  <!-- Treatment → Intervention edges -->
  <line x1="518" y1="140" x2="634" y2="140" stroke="#00ff9d" stroke-width="1" opacity="0.5" marker-end="url(#arrGreen)"/>
  <line x1="518" y1="148" x2="634" y2="215" stroke="#00ff9d" stroke-width="0.8" opacity="0.4" marker-end="url(#arrGreen)"/>
  <line x1="518" y1="260" x2="634" y2="295" stroke="#00ff9d" stroke-width="1" opacity="0.5" marker-end="url(#arrGreen)"/>
  <line x1="514" y1="390" x2="634" y2="375" stroke="#00ff9d" stroke-width="0.8" opacity="0.4" marker-end="url(#arrGreen)"/>

  <!-- Urgency → intervention edges (critical → isolate) -->
  <line x1="512" y1="496" x2="634" y2="152" stroke="#ff4060" stroke-width="0.7" opacity="0.25" stroke-dasharray="3,3" marker-end="url(#arrRed)"/>

  <!-- Rules fired annotations -->
  <rect x="62" y="580" width="220" height="92" fill="rgba(124,77,255,0.05)" stroke="#7c4dff" stroke-width="0.8"/>
  <text x="172" y="598" text-anchor="middle" fill="#7c4dff" font-size="7" letter-spacing="2">INFERENCE RULES (20+)</text>
  <text x="75" y="616" fill="#8899bb" font-size="7">fungal_disease_rule     → treatment: fungicide</text>
  <text x="75" y="630" fill="#8899bb" font-size="7">high_severity_rule      → escalation flag</text>
  <text x="75" y="644" fill="#8899bb" font-size="7">widespread_spread_rule  → requires isolation</text>
  <text x="75" y="658" fill="#8899bb" font-size="7">urgency_composite_rule  → urgency score 0–1</text>
  <text x="75" y="672" fill="#8899bb" font-size="7">worsening_trend_rule    → escalate plan</text>

  <!-- Stats box -->
  <rect x="300" y="610" width="340" height="60" fill="rgba(0,0,0,0.3)" stroke="#8899bb" stroke-width="0.5"/>
  <text x="470" y="628" text-anchor="middle" fill="#8899bb" font-size="7" letter-spacing="2">GRAPH STATISTICS</text>
  <text x="320" y="647" fill="#e8f0fe" font-size="8">Nodes: ~45</text>
  <text x="420" y="647" fill="#e8f0fe" font-size="8">Edges: ~120</text>
  <text x="530" y="647" fill="#e8f0fe" font-size="8">Rules: 20+</text>
  <text x="320" y="663" fill="#8899bb" font-size="7">Disease nodes: 15  ·  Treatment nodes: 8  ·  Urgency nodes: 4</text>

  <text x="450" y="690" text-anchor="middle" fill="#4a5568" font-size="7">Muhammad Aqib Niazi  ·  ExplainPlan Vision  ·  2026</text>
</svg>
